<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scales of Reality</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #05060a;
    --fg: #e8eef7;
    --dim: #8a93a6;
    --accent: #6cf;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg); color: var(--fg);
    font-family: ui-sans-serif, system-ui, -apple-system, "SF Pro Text", sans-serif; }
  #stage { position: fixed; inset: 0; cursor: ns-resize; }
  canvas { display: block; width: 100%; height: 100%; }

  .hud { position: fixed; pointer-events: none; padding: 16px 20px; font-variant-numeric: tabular-nums; }
  .hud.top-left { top: 0; left: 0; }
  .hud.top-right { top: 0; right: 0; text-align: right; }
  .hud.bottom { left: 0; right: 0; bottom: 0; text-align: center; padding-bottom: 22px; }

  .title { font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim); }
  .label { font-size: 28px; font-weight: 600; margin-top: 4px; }
  .sub { font-size: 13px; color: var(--dim); margin-top: 2px; max-width: 360px; }

  .scale-num { font-size: 44px; font-weight: 200; letter-spacing: -0.02em; }
  .scale-unit { font-size: 14px; color: var(--dim); }

  .hint { font-size: 12px; color: var(--dim); }
  .hint kbd { font-family: inherit; padding: 1px 6px; border: 1px solid #2a3142; border-radius: 4px;
    background: #11151f; color: var(--fg); font-size: 11px; }

  .rail { position: fixed; right: 20px; top: 50%; transform: translateY(-50%);
    width: 4px; height: 60vh; background: #11151f; border-radius: 2px;
    cursor: ns-resize; pointer-events: auto; }
  .rail::before { content: ""; position: absolute; inset: -8px -20px; }
  .rail .knob { position: absolute; left: -8px; width: 20px; height: 20px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 12px rgba(102, 204, 255, 0.6); transform: translateY(-50%);
    cursor: grab; pointer-events: auto; }
  .rail .knob:active { cursor: grabbing; }
  .rail .tick { position: absolute; left: -14px; width: 28px; height: 1px; background: #2a3142; }
  .rail .tickLabel { position: absolute; left: -68px; width: 50px; text-align: right;
    font-size: 10px; color: var(--dim); transform: translateY(-50%); }
</style>
</head>
<body>
<div id="stage"><canvas id="c"></canvas></div>

<div class="hud top-left">
  <div class="title">Now Viewing</div>
  <div class="label" id="objName">—</div>
  <div class="sub" id="objDesc">—</div>
</div>

<div class="hud top-right">
  <div class="title">Scale</div>
  <div class="scale-num"><span id="scaleNum">10⁰</span></div>
  <div class="scale-unit"><span id="scaleHuman">1 meter</span></div>
</div>

<div class="rail" id="rail"></div>

<div class="hud bottom">
  <div class="hint">
    Scroll / pinch to zoom · <kbd>↑</kbd><kbd>↓</kbd> step · <kbd>0</kbd> reset · drag vertically
  </div>
</div>

<script>
// ---------- Scale anchors ----------
// Each entry: {logM: log10(meters), name, desc, color, draw?}
// Spans Planck length (~ -35) to observable universe radius (~ 26.7).
const ANCHORS = [
  { logM: 26.8,  name: "Observable Universe",    desc: "~93 billion light-years across; cosmic web of filaments and voids.", color: "#7a5cff", shape: "cosmicweb" },
  { logM: 24.0,  name: "Local Superclusters",    desc: "Laniakea, Virgo. Galaxy clusters threaded along filaments.",          color: "#9a7cff", shape: "filaments" },
  { logM: 23.0,  name: "Galaxy Clusters",        desc: "Thousands of galaxies bound by gravity and dark matter halos.",      color: "#b08cff", shape: "cluster_galaxies" },
  { logM: 21.0,  name: "Milky Way",              desc: "Barred spiral galaxy, ~100,000 light-years across.",                 color: "#cfa9ff", shape: "spiral" },
  { logM: 17.0,  name: "Local Stellar Neighborhood", desc: "Nearest stars within tens of light-years.",                      color: "#ffd27a", shape: "starfield" },
  { logM: 13.5,  name: "Solar System",           desc: "Sun, planets, Kuiper belt out to the heliopause.",                    color: "#ffb84a", shape: "orbits" },
  { logM: 11.0,  name: "Inner Solar System",     desc: "Sun and rocky planets within a few AU.",                              color: "#ff9a3a", shape: "orbits_inner" },
  { logM: 9.0,   name: "Earth–Moon System",      desc: "Moon orbits Earth at ~384,000 km.",                                   color: "#7ad1ff", shape: "earthmoon" },
  { logM: 7.0,   name: "Planet Earth",           desc: "Radius ~6,371 km. Continents, oceans, atmosphere.",                  color: "#5fbfff", shape: "earth" },
  { logM: 6.0,   name: "Mountain Range",         desc: "The landscape around the city where the person lives.",               color: "#7fae7a", shape: "range" },
  { logM: 4.0,   name: "Single Mountain",        desc: "A peak on the horizon, ~10 km tall.",                                 color: "#8fd28b", shape: "mountain" },
  { logM: 2.5,   name: "Skyscraper",             desc: "~300 m — a tower beside the park.",                                   color: "#b6c2cf", shape: "skyscraper" },
  { logM: 1.0,   name: "City Block",             desc: "~100 m — streets and a park where a person stands.",                  color: "#a8d68b", shape: "cityblock" },
  { logM: 0.0,   name: "Person",                 desc: "1 meter — a human standing in the scene.",                            color: "#ffe28a", shape: "human" },
  { logM: -1.5,  name: "Hand",                   desc: "Centimeters — the same person's outstretched hand.",                  color: "#f0c89a", shape: "hand" },
  { logM: -3.0,  name: "Skin Surface",           desc: "~1 mm — ridges, a pore, a single hair emerging.",                     color: "#e6b890", shape: "skin" },
  { logM: -4.0,  name: "Hair Shaft",             desc: "~70–100 µm — cross-section of that hair.",                            color: "#cfa478", shape: "hair" },
  { logM: -5.0,  name: "Skin Cell",              desc: "~30 µm — a keratinocyte beside the hair follicle.",                   color: "#f4b48c", shape: "cell" },
  { logM: -6.0,  name: "Bacterium",              desc: "~1 µm — E. coli resting on the skin's surface.",                      color: "#74c47a", shape: "bacterium" },
  { logM: -7.5,  name: "Virus",                  desc: "~30–300 nm — a virion next to the bacterium.",                        color: "#5fb37a", shape: "virus" },
  { logM: -8.5,  name: "DNA Helix",              desc: "~2 nm — the genome coiled inside that cell.",                         color: "#74c4b5", shape: "dna" },
  { logM: -9.5,  name: "Small Molecule",         desc: "A water molecule along the helix's backbone.",                        color: "#6cd1cf", shape: "molecule" },
  { logM: -10.0, name: "Atom",                   desc: "Carbon atom from the DNA backbone. Electron cloud ~0.1 nm.",          color: "#6cf",    shape: "atom" },
  { logM: -12.0, name: "Atomic Nucleus Vicinity",desc: "Electrons orbit at ~10⁻¹⁰ m; nucleus is 10,000× smaller.",          color: "#5cb8ff", shape: "atom_far" },
  { logM: -15.0, name: "Atomic Nucleus",         desc: "~1 femtometer. Protons and neutrons packed tight.",                  color: "#ff7aa8", shape: "nucleus" },
  { logM: -18.0, name: "Quarks & Leptons",       desc: "Point-like, < 10⁻¹⁸ m. Building blocks of matter.",                  color: "#ff5fae", shape: "quarks" },
  { logM: -23.0, name: "Sub-Planckian Realm",    desc: "Beyond current experimental reach.",                                  color: "#c77aff", shape: "planck" },
  { logM: -35.0, name: "Planck Length",          desc: "1.616 × 10⁻³⁵ m. Where known physics breaks down.",                  color: "#ffffff", shape: "planck" },
];

const MIN_LOG = ANCHORS[ANCHORS.length - 1].logM; // -35
const MAX_LOG = ANCHORS[0].logM;                  // 26.8

// ---------- State ----------
let logM = 0;        // current scale: viewport spans ~ 10^logM meters across
let targetLog = 0;
const SMOOTH = 0.12;

// ---------- Canvas ----------
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = 1;
  W = canvas.clientWidth = window.innerWidth;
  H = canvas.clientHeight = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener("resize", resize);
resize();

// ---------- Interaction ----------
canvas.addEventListener("wheel", (e) => {
  e.preventDefault();
  targetLog += e.deltaY * 0.01;
  clampTarget();
}, { passive: false });

let dragging = false, dragY = 0;
canvas.addEventListener("pointerdown", (e) => { dragging = true; dragY = e.clientY; canvas.setPointerCapture(e.pointerId); });
canvas.addEventListener("pointermove", (e) => {
  if (!dragging) return;
  const dy = e.clientY - dragY;
  dragY = e.clientY;
  targetLog += dy * 0.02;
  clampTarget();
});
canvas.addEventListener("pointerup", () => { dragging = false; });

window.addEventListener("keydown", (e) => {
  if (e.key === "ArrowUp")   { targetLog -= 0.5; clampTarget(); }
  if (e.key === "ArrowDown") { targetLog += 0.5; clampTarget(); }
  if (e.key === "0")         { targetLog = 0; }
  if (e.key === "PageUp")    { targetLog -= 3; clampTarget(); }
  if (e.key === "PageDown")  { targetLog += 3; clampTarget(); }
});

function clampTarget() {
  targetLog = Math.max(MIN_LOG, Math.min(MAX_LOG, targetLog));
}

// ---------- Helpers ----------
function lerp(a, b, t) { return a + (b - a) * t; }
function smoothstep(t) { return t * t * (3 - 2 * t); }

function findAnchors(L) {
  // Anchors are sorted by logM descending. Find pair bracketing L.
  for (let i = 0; i < ANCHORS.length - 1; i++) {
    const a = ANCHORS[i], b = ANCHORS[i + 1];
    if (L <= a.logM && L >= b.logM) {
      const t = (a.logM - L) / (a.logM - b.logM);
      return { a, b, t };
    }
  }
  if (L > ANCHORS[0].logM) return { a: ANCHORS[0], b: ANCHORS[0], t: 0 };
  const last = ANCHORS[ANCHORS.length - 1];
  return { a: last, b: last, t: 0 };
}

function formatScale(L) {
  // Returns { num: "10^x", human: "1 km" }
  const exp = Math.round(L * 10) / 10;
  const sup = String(exp).replace(/-/g, "⁻").replace(/\d/g, d => "⁰¹²³⁴⁵⁶⁷⁸⁹"[+d]).replace(".", "·");
  const numStr = `10${sup} m`;
  // Choose a friendly unit
  const units = [
    { e: 24,  n: "yottameters" }, { e: 21, n: "zettameters" }, { e: 18, n: "exameters" },
    { e: 15,  n: "petameters" },  { e: 12, n: "terameters" },  { e: 9,  n: "gigameters" },
    { e: 6,   n: "megameters" },  { e: 3,  n: "kilometers" },  { e: 0,  n: "meters" },
    { e: -3,  n: "millimeters" }, { e: -6, n: "micrometers" }, { e: -9, n: "nanometers" },
    { e: -12, n: "picometers" },  { e: -15,n: "femtometers" }, { e: -18,n: "attometers" },
    { e: -21, n: "zeptometers" }, { e: -24,n: "yoctometers" },
  ];
  let best = units[units.length - 1];
  for (const u of units) { if (exp >= u.e) { best = u; break; } }
  const val = Math.pow(10, exp - best.e);
  const valStr = val >= 100 ? val.toFixed(0) : val >= 10 ? val.toFixed(1) : val.toFixed(2);
  return { num: numStr, human: `${valStr} ${best.n}` };
}

// ---------- Render ----------
let stars = [];
function seedStars(n) {
  stars = [];
  for (let i = 0; i < n; i++) {
    stars.push({ x: Math.random(), y: Math.random(), r: Math.random() * 1.4 + 0.2, p: Math.random() });
  }
}
seedStars(150);

function drawBackdrop(L) {
  // Background gradient shifts with scale
  const cosmic = Math.max(0, Math.min(1, (L - 6) / 20));     // 0..1 over scales 10^6..10^26
  const quantum = Math.max(0, Math.min(1, (-L - 8) / 27));    // 0..1 over scales 10^-8..10^-35
  const r = Math.floor(lerp(lerp(10, 30, cosmic), 50, quantum));
  const g = Math.floor(lerp(lerp(12, 10, cosmic), 10, quantum));
  const bl = Math.floor(lerp(lerp(20, 35, cosmic), 60, quantum));
  ctx.fillStyle = `rgb(${r},${g},${bl})`;
  ctx.fillRect(0, 0, W, H);

  // Star field — visible at cosmic scales
  if (cosmic > 0) {
    ctx.globalAlpha = cosmic;
    for (const s of stars) {
      const tw = 0.6 + 0.4 * Math.sin(performance.now() * 0.001 + s.p * 10);
      ctx.fillStyle = `rgba(255,255,255,${0.4 + 0.6 * tw})`;
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Quantum fuzz — visible at sub-atomic scales
  if (quantum > 0) {
    ctx.globalAlpha = quantum * 0.6;
    for (let i = 0; i < 80; i++) {
      const x = (Math.sin(i * 12.9 + performance.now() * 0.002) * 0.5 + 0.5) * W;
      const y = (Math.cos(i * 7.7 + performance.now() * 0.0017) * 0.5 + 0.5) * H;
      ctx.fillStyle = `hsla(${(i * 13 + performance.now() * 0.05) % 360}, 80%, 70%, 0.6)`;
      ctx.beginPath();
      ctx.arc(x, y, 2 + Math.sin(performance.now() * 0.003 + i) * 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

function drawObject(L) {
  const { a, b, t } = findAnchors(L);
  const ts = smoothstep(t);

  // Blend two anchors: fade-out outgoing as we approach next
  drawAnchor(a, 1 - ts, L);
  if (b !== a) drawAnchor(b, ts, L);
}

function drawAnchor(anchor, alpha, L) {
  if (alpha <= 0.01) return;
  const cx = W / 2, cy = H / 2;
  const baseR = Math.min(W, H) * 0.28;

  ctx.globalAlpha = alpha;

  // Soft glow
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, baseR * 2.2);
  grad.addColorStop(0, hexA(anchor.color, 0.35));
  grad.addColorStop(0.5, hexA(anchor.color, 0.08));
  grad.addColorStop(1, hexA(anchor.color, 0));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = anchor.color;
  ctx.fillStyle = hexA(anchor.color, 0.7);
  ctx.lineWidth = 2;

  const fn = SHAPES[anchor.shape] || SHAPES.blob;
  fn(cx, cy, baseR, anchor.color, anchor);

  ctx.globalAlpha = 1;
}

const SHAPES = {
  cosmicweb: (cx, cy, R, c) => {
    // Filamentary web of nodes connected by faint lines
    const t = performance.now() * 0.0001;
    const N = 30;
    const pts = [];
    for (let i = 0; i < N; i++) {
      const a = (i * 2.3 + t) % (Math.PI * 2);
      const rr = R * (0.2 + ((i * 53) % 100) / 100 * 0.95);
      pts.push({ x: cx + Math.cos(a) * rr, y: cy + Math.sin(a) * rr * 0.9, m: 0.5 + ((i * 17) % 100) / 100 });
    }
    ctx.strokeStyle = hexA(c, 0.18);
    ctx.lineWidth = 1;
    for (let i = 0; i < pts.length; i++) {
      for (let j = i + 1; j < pts.length; j++) {
        const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
        const d = Math.hypot(dx, dy);
        if (d < R * 0.35) { ctx.beginPath(); ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[j].x, pts[j].y); ctx.stroke(); }
      }
    }
    for (const p of pts) {
      ctx.fillStyle = hexA(c, 0.7);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.m * 3, 0, Math.PI * 2); ctx.fill();
    }
  },
  filaments: (cx, cy, R, c) => {
    // Long stringy clusters
    const t = performance.now() * 0.00015;
    for (let f = 0; f < 5; f++) {
      const ang = f * 1.2 + t;
      ctx.strokeStyle = hexA(c, 0.4);
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i <= 40; i++) {
        const s = (i / 40 - 0.5) * R * 1.8;
        const wobble = Math.sin(i * 0.5 + f) * R * 0.08;
        const x = cx + Math.cos(ang) * s + Math.cos(ang + Math.PI / 2) * wobble;
        const y = cy + Math.sin(ang) * s + Math.sin(ang + Math.PI / 2) * wobble;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        if (i % 4 === 0) { ctx.fillStyle = hexA(c, 0.8); ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI * 2); ctx.fill(); ctx.moveTo(x, y); }
      }
      ctx.stroke();
    }
  },
  cluster_galaxies: (cx, cy, R, c) => {
    const t = performance.now() * 0.0002;
    for (let i = 0; i < 18; i++) {
      const a = i * 0.9 + t * 0.5;
      const rr = R * (0.15 + ((i * 41) % 100) / 100 * 0.8);
      const x = cx + Math.cos(a) * rr;
      const y = cy + Math.sin(a) * rr * 0.85;
      const sz = R * (0.04 + ((i * 23) % 100) / 100 * 0.05);
      const g = ctx.createRadialGradient(x, y, 0, x, y, sz * 2);
      g.addColorStop(0, "#fff"); g.addColorStop(0.4, hexA(c, 0.6)); g.addColorStop(1, hexA(c, 0));
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(x, y, sz * 2, 0, Math.PI * 2); ctx.fill();
    }
  },
  spiral: (cx, cy, R, c) => drawSwirl(cx, cy, R, c),
  starfield: (cx, cy, R, c) => {
    for (let i = 0; i < 40; i++) {
      const a = i * 2.7;
      const rr = R * (((i * 31) % 100) / 100);
      const x = cx + Math.cos(a) * rr;
      const y = cy + Math.sin(a) * rr;
      const sz = 1 + ((i * 13) % 30) / 10;
      const g = ctx.createRadialGradient(x, y, 0, x, y, sz * 4);
      g.addColorStop(0, "#fff"); g.addColorStop(1, hexA(c, 0));
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(x, y, sz * 4, 0, Math.PI * 2); ctx.fill();
    }
  },
  orbits: (cx, cy, R, c) => drawOrbits(cx, cy, R, c),
  orbits_inner: (cx, cy, R, c) => {
    const t = performance.now() * 0.001;
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, R * 0.3);
    g.addColorStop(0, "#fff8d4"); g.addColorStop(0.4, "#ffce6a"); g.addColorStop(1, hexA("#ff9a3a", 0));
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, R * 0.3, 0, Math.PI * 2); ctx.fill();
    const planets = [{r: 0.45, sz: 3, col: "#c8a282"}, {r: 0.6, sz: 5, col: "#e8c89a"}, {r: 0.78, sz: 5.5, col: "#5fbfff"}, {r: 0.95, sz: 4, col: "#d27a5f"}];
    for (let i = 0; i < planets.length; i++) {
      const p = planets[i];
      ctx.strokeStyle = hexA(c, 0.3);
      ctx.beginPath(); ctx.ellipse(cx, cy, R * p.r, R * p.r * 0.8, 0, 0, Math.PI * 2); ctx.stroke();
      const ang = t * (1.5 - i * 0.3) + i;
      ctx.fillStyle = p.col;
      ctx.beginPath(); ctx.arc(cx + Math.cos(ang) * R * p.r, cy + Math.sin(ang) * R * p.r * 0.8, p.sz, 0, Math.PI * 2); ctx.fill();
    }
  },
  earthmoon: (cx, cy, R, c) => {
    const t = performance.now() * 0.0005;
    drawPlanet(cx - R * 0.15, cy, R * 0.22, "#5fbfff");
    const mx = cx - R * 0.15 + Math.cos(t) * R * 0.7;
    const my = cy + Math.sin(t) * R * 0.55;
    ctx.fillStyle = "#cfcfcf";
    ctx.beginPath(); ctx.arc(mx, my, R * 0.06, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = hexA(c, 0.25);
    ctx.beginPath(); ctx.ellipse(cx - R * 0.15, cy, R * 0.7, R * 0.55, 0, 0, Math.PI * 2); ctx.stroke();
  },
  earth: (cx, cy, R, c) => {
    ctx.fillStyle = "#1a4a7a";
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.fill();
    ctx.save();
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.clip();
    ctx.fillStyle = "#3a7a4a";
    const blobs = [[-0.3, -0.2, 0.35], [0.2, -0.4, 0.25], [-0.1, 0.3, 0.4], [0.4, 0.1, 0.2], [-0.5, 0.4, 0.2]];
    for (const [bx, by, br] of blobs) {
      ctx.beginPath(); ctx.ellipse(cx + bx * R, cy + by * R, R * br, R * br * 0.7, 0, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
    const g = ctx.createRadialGradient(cx - R * 0.4, cy - R * 0.3, R * 0.1, cx, cy, R);
    g.addColorStop(0, "rgba(255,255,255,0.2)"); g.addColorStop(0.5, "rgba(0,0,0,0)"); g.addColorStop(1, "rgba(0,0,0,0.55)");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.fill();
  },
  range: (cx, cy, R, c) => {
    // Multiple triangular peaks across the view
    ctx.fillStyle = hexA(c, 0.85);
    ctx.beginPath();
    ctx.moveTo(cx - R, cy + R * 0.4);
    const peaks = [-0.85, -0.6, -0.4, -0.15, 0.1, 0.35, 0.55, 0.8];
    const heights = [0.3, 0.6, 0.45, 0.8, 0.55, 0.7, 0.4, 0.5];
    for (let i = 0; i < peaks.length; i++) {
      ctx.lineTo(cx + peaks[i] * R - R * 0.05, cy + R * 0.4);
      ctx.lineTo(cx + peaks[i] * R, cy - R * heights[i]);
      ctx.lineTo(cx + peaks[i] * R + R * 0.05, cy + R * 0.4);
    }
    ctx.lineTo(cx + R, cy + R * 0.4);
    ctx.closePath();
    ctx.fill();
    // Snow caps
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    for (let i = 0; i < peaks.length; i++) {
      ctx.beginPath();
      ctx.moveTo(cx + peaks[i] * R - R * 0.025, cy - R * heights[i] + R * 0.12);
      ctx.lineTo(cx + peaks[i] * R, cy - R * heights[i]);
      ctx.lineTo(cx + peaks[i] * R + R * 0.025, cy - R * heights[i] + R * 0.12);
      ctx.closePath(); ctx.fill();
    }
    // Ground
    ctx.fillStyle = "rgba(80,60,40,0.6)";
    ctx.fillRect(cx - R, cy + R * 0.4, R * 2, R * 0.6);
  },
  mountain: (cx, cy, R, c) => {
    ctx.fillStyle = hexA(c, 0.9);
    ctx.beginPath();
    ctx.moveTo(cx - R, cy + R * 0.5);
    ctx.lineTo(cx - R * 0.3, cy - R * 0.1);
    ctx.lineTo(cx, cy - R * 0.85);
    ctx.lineTo(cx + R * 0.4, cy - R * 0.3);
    ctx.lineTo(cx + R, cy + R * 0.5);
    ctx.closePath(); ctx.fill();
    // Snow cap
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.beginPath();
    ctx.moveTo(cx - R * 0.18, cy - R * 0.45);
    ctx.lineTo(cx, cy - R * 0.85);
    ctx.lineTo(cx + R * 0.22, cy - R * 0.5);
    ctx.lineTo(cx + R * 0.1, cy - R * 0.4);
    ctx.lineTo(cx - R * 0.05, cy - R * 0.5);
    ctx.closePath(); ctx.fill();
    // Shadow side
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.beginPath();
    ctx.moveTo(cx, cy - R * 0.85);
    ctx.lineTo(cx + R * 0.4, cy - R * 0.3);
    ctx.lineTo(cx + R, cy + R * 0.5);
    ctx.lineTo(cx, cy + R * 0.5);
    ctx.closePath(); ctx.fill();
  },
  skyscraper: (cx, cy, R, c) => {
    // Skyline silhouette with the tallest in the middle
    ctx.fillStyle = "#2a3142";
    const buildings = [
      [-0.95, 0.35, 0.5], [-0.7, 0.25, 0.55], [-0.45, 0.4, 0.45], [-0.2, 0.18, 0.7],
      [0.1, 0.3, 0.6], [0.35, 0.22, 0.65], [0.6, 0.32, 0.5], [0.85, 0.28, 0.55]
    ];
    // Middle tower
    ctx.fillStyle = hexA(c, 0.95);
    ctx.fillRect(cx - R * 0.08, cy - R * 0.85, R * 0.16, R * 1.3);
    // Antenna
    ctx.fillRect(cx - R * 0.01, cy - R * 1.0, R * 0.02, R * 0.15);
    // Windows
    ctx.fillStyle = "#ffe28a";
    for (let r = 0; r < 14; r++) for (let cwin = 0; cwin < 3; cwin++) {
      if ((r * 7 + cwin * 13) % 5 < 3)
        ctx.fillRect(cx - R * 0.065 + cwin * R * 0.045, cy - R * 0.8 + r * R * 0.085, R * 0.025, R * 0.04);
    }
    // Side buildings
    ctx.fillStyle = "#2a3142";
    for (const [px, w, h] of buildings) {
      ctx.fillRect(cx + px * R - R * w * 0.08, cy + R * 0.45 - R * h, R * w * 0.16, R * h);
    }
    ctx.fillStyle = "rgba(0,0,0,0.4)";
    ctx.fillRect(cx - R, cy + R * 0.45, R * 2, R * 0.55);
  },
  cityblock: (cx, cy, R, c) => {
    // Top-down street grid
    ctx.fillStyle = "#1a1f2a";
    ctx.fillRect(cx - R, cy - R, R * 2, R * 2);
    // Blocks
    for (let r = 0; r < 4; r++) for (let cc = 0; cc < 4; cc++) {
      const bx = cx - R + R * 0.15 + cc * R * 0.5;
      const by = cy - R + R * 0.15 + r * R * 0.5;
      ctx.fillStyle = hexA(c, 0.4 + ((r * 7 + cc * 11) % 10) / 30);
      ctx.fillRect(bx, by, R * 0.35, R * 0.35);
      // Internal building lots
      ctx.fillStyle = "rgba(255,255,255,0.08)";
      for (let i = 0; i < 4; i++) {
        ctx.fillRect(bx + R * 0.02 + (i % 2) * R * 0.17, by + R * 0.02 + Math.floor(i / 2) * R * 0.17, R * 0.13, R * 0.13);
      }
    }
    // Cars (yellow dots) on streets
    ctx.fillStyle = "#ffe28a";
    const t = performance.now() * 0.0005;
    for (let i = 0; i < 8; i++) {
      const lane = (i % 4) * R * 0.5 - R * 0.75;
      const pos = ((t * (i % 2 ? 1 : -1) + i * 0.3) % 2 - 1) * R;
      if (i < 4) ctx.fillRect(cx + pos, cy + lane - 1.5, 4, 3);
      else ctx.fillRect(cx + lane - 1.5, cy + pos, 3, 4);
    }
  },
  hand: (cx, cy, R, c) => drawHand(cx, cy, R, c),
  skin: (cx, cy, R, c) => drawSkin(cx, cy, R, c),
  human: (cx, cy, R, c) => {
    // Stick-figure-ish person
    ctx.strokeStyle = c;
    ctx.fillStyle = c;
    ctx.lineWidth = R * 0.04;
    ctx.lineCap = "round";
    const headR = R * 0.12;
    // Head
    ctx.beginPath(); ctx.arc(cx, cy - R * 0.6, headR, 0, Math.PI * 2); ctx.fill();
    // Body
    ctx.beginPath(); ctx.moveTo(cx, cy - R * 0.48); ctx.lineTo(cx, cy + R * 0.15); ctx.stroke();
    // Arms
    ctx.beginPath(); ctx.moveTo(cx - R * 0.3, cy - R * 0.1); ctx.lineTo(cx, cy - R * 0.35); ctx.lineTo(cx + R * 0.3, cy - R * 0.1); ctx.stroke();
    // Legs
    ctx.beginPath(); ctx.moveTo(cx - R * 0.22, cy + R * 0.7); ctx.lineTo(cx, cy + R * 0.15); ctx.lineTo(cx + R * 0.22, cy + R * 0.7); ctx.stroke();
    // Ground line
    ctx.strokeStyle = hexA(c, 0.3);
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx - R, cy + R * 0.72); ctx.lineTo(cx + R, cy + R * 0.72); ctx.stroke();
  },
  hair: (cx, cy, R, c) => {
    // Cross-section: cylinder viewed at angle
    ctx.fillStyle = hexA(c, 0.85);
    ctx.beginPath(); ctx.ellipse(cx, cy, R * 0.18, R * 0.85, 0, 0, Math.PI * 2); ctx.fill();
    // Cuticle scales
    ctx.strokeStyle = "rgba(0,0,0,0.35)";
    ctx.lineWidth = 1;
    for (let i = -8; i <= 8; i++) {
      const y = cy + i * R * 0.1;
      ctx.beginPath();
      ctx.ellipse(cx, y, R * 0.16, R * 0.04, 0, 0, Math.PI, false);
      ctx.stroke();
    }
    // Side highlight
    ctx.fillStyle = "rgba(255,255,255,0.25)";
    ctx.beginPath(); ctx.ellipse(cx - R * 0.07, cy, R * 0.03, R * 0.8, 0, 0, Math.PI * 2); ctx.fill();
  },
  cell: (cx, cy, R, c) => {
    // Animal/skin cell: irregular polygonal outline with nucleus and organelles.
    // A pale hair-shaft slice intrudes from the left, linking back to the hair frame.
    ctx.fillStyle = "rgba(180,120,90,0.25)";
    ctx.fillRect(cx - R * 1.2, cy - R * 1.0, R * 0.45, R * 2.0);
    ctx.strokeStyle = "rgba(140,90,60,0.6)";
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx - R * 0.75, cy - R); ctx.lineTo(cx - R * 0.75, cy + R); ctx.stroke();

    // Cell body — irregular polygon
    ctx.fillStyle = hexA(c, 0.35);
    ctx.strokeStyle = hexA(c, 0.9);
    ctx.lineWidth = 3;
    const verts = [[-0.55,-0.7],[0.1,-0.85],[0.7,-0.55],[0.85,0.05],[0.65,0.65],[0.05,0.8],[-0.5,0.55],[-0.65,-0.05]];
    ctx.beginPath();
    for (let i = 0; i < verts.length; i++) {
      const x = cx + verts[i][0] * R, y = cy + verts[i][1] * R;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();

    // Nucleus
    ctx.fillStyle = hexA("#a06cff", 0.75);
    ctx.beginPath(); ctx.arc(cx + R * 0.05, cy, R * 0.28, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "rgba(0,0,0,0.45)";
    ctx.beginPath(); ctx.arc(cx + R * 0.1, cy - R * 0.05, R * 0.09, 0, Math.PI * 2); ctx.fill();

    // Mitochondria
    ctx.fillStyle = hexA("#ff9a6a", 0.85);
    for (const [px, py, rot] of [[0.45,-0.35,0.3],[-0.3,-0.45,-0.4],[0.4,0.45,0.2],[-0.35,0.3,0.6]]) {
      ctx.beginPath(); ctx.ellipse(cx + px * R, cy + py * R, R * 0.1, R * 0.04, rot, 0, Math.PI * 2); ctx.fill();
    }
    // Keratin granules
    ctx.fillStyle = "rgba(255,220,160,0.5)";
    for (let i = 0; i < 12; i++) {
      const a = i * 1.3;
      ctx.beginPath(); ctx.arc(cx + Math.cos(a) * R * 0.5, cy + Math.sin(a) * R * 0.5, R * 0.03, 0, Math.PI * 2); ctx.fill();
    }
  },
  bacterium: (cx, cy, R, c) => {
    // Rod with flagellum
    const t = performance.now() * 0.005;
    ctx.fillStyle = hexA(c, 0.9);
    ctx.beginPath(); ctx.ellipse(cx, cy, R * 0.55, R * 0.22, 0.3, 0, Math.PI * 2); ctx.fill();
    // Inner texture
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    for (let i = 0; i < 8; i++) {
      const a = i * 0.7;
      ctx.beginPath(); ctx.arc(cx + Math.cos(a) * R * 0.3, cy + Math.sin(a) * R * 0.1, R * 0.04, 0, Math.PI * 2); ctx.fill();
    }
    // Flagellum
    ctx.strokeStyle = hexA(c, 0.8);
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i <= 30; i++) {
      const s = i / 30;
      const x = cx - R * 0.5 - s * R * 0.7;
      const y = cy + R * 0.15 + Math.sin(s * 10 + t) * R * 0.05;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  },
  virus: (cx, cy, R, c) => {
    // Spiky icosahedral capsid
    ctx.fillStyle = hexA(c, 0.9);
    ctx.beginPath(); ctx.arc(cx, cy, R * 0.45, 0, Math.PI * 2); ctx.fill();
    // Spikes
    for (let i = 0; i < 20; i++) {
      const a = i * (Math.PI * 2 / 20);
      const x1 = cx + Math.cos(a) * R * 0.45;
      const y1 = cy + Math.sin(a) * R * 0.45;
      const x2 = cx + Math.cos(a) * R * 0.7;
      const y2 = cy + Math.sin(a) * R * 0.7;
      ctx.strokeStyle = hexA(c, 0.8);
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
      ctx.fillStyle = "#ff7aa8";
      ctx.beginPath(); ctx.arc(x2, y2, R * 0.05, 0, Math.PI * 2); ctx.fill();
    }
    // Inner pattern
    ctx.strokeStyle = "rgba(0,0,0,0.3)";
    ctx.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
      const a = i * (Math.PI / 3);
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * R * 0.45, cy + Math.sin(a) * R * 0.45);
      ctx.lineTo(cx + Math.cos(a + Math.PI) * R * 0.45, cy + Math.sin(a + Math.PI) * R * 0.45);
      ctx.stroke();
    }
  },
  dna: (cx, cy, R, c) => {
    const t = performance.now() * 0.001;
    ctx.lineWidth = 3;
    for (let i = 0; i < 60; i++) {
      const y = cy - R + (i / 60) * R * 2;
      const phase = (i / 60) * Math.PI * 6 + t;
      const x1 = cx + Math.sin(phase) * R * 0.3;
      const x2 = cx - Math.sin(phase) * R * 0.3;
      if (i > 0) {
        const py = cy - R + ((i - 1) / 60) * R * 2;
        const ph2 = ((i - 1) / 60) * Math.PI * 6 + t;
        ctx.strokeStyle = hexA(c, 0.9);
        ctx.beginPath(); ctx.moveTo(cx + Math.sin(ph2) * R * 0.3, py); ctx.lineTo(x1, y); ctx.stroke();
        ctx.strokeStyle = hexA("#ff7aa8", 0.9);
        ctx.beginPath(); ctx.moveTo(cx - Math.sin(ph2) * R * 0.3, py); ctx.lineTo(x2, y); ctx.stroke();
      }
      // Rungs every few
      if (i % 4 === 0) {
        ctx.strokeStyle = hexA("#ffe28a", 0.7);
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x2, y); ctx.stroke();
        ctx.lineWidth = 3;
      }
    }
  },
  molecule: (cx, cy, R, c) => {
    // Ball-and-stick (water-ish)
    const atoms = [
      { x: 0, y: 0, r: 0.18, col: "#ff5fae" },
      { x: -0.4, y: 0.35, r: 0.12, col: "#ffffff" },
      { x: 0.4, y: 0.35, r: 0.12, col: "#ffffff" },
    ];
    ctx.strokeStyle = "rgba(255,255,255,0.4)";
    ctx.lineWidth = 5;
    for (let i = 1; i < atoms.length; i++) {
      ctx.beginPath();
      ctx.moveTo(cx + atoms[0].x * R, cy + atoms[0].y * R);
      ctx.lineTo(cx + atoms[i].x * R, cy + atoms[i].y * R);
      ctx.stroke();
    }
    for (const a of atoms) {
      const x = cx + a.x * R, y = cy + a.y * R;
      const g = ctx.createRadialGradient(x - a.r * R * 0.3, y - a.r * R * 0.3, 0, x, y, a.r * R);
      g.addColorStop(0, "#fff"); g.addColorStop(0.3, a.col); g.addColorStop(1, hexA(a.col, 0.7));
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(x, y, a.r * R, 0, Math.PI * 2); ctx.fill();
    }
  },
  atom: (cx, cy, R, c) => drawAtom(cx, cy, R, c),
  atom_far: (cx, cy, R, c) => {
    // Atom but the nucleus is a tiny dot — emphasizes emptiness
    drawAtom(cx, cy, R, c);
    ctx.fillStyle = "#fff";
    ctx.font = "12px ui-sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("nucleus →", cx, cy + R * 0.05);
  },
  nucleus: (cx, cy, R, c) => {
    // Protons & neutrons packed
    const items = [];
    for (let i = 0; i < 16; i++) {
      const a = i * 0.4;
      const rr = Math.sqrt(i) * R * 0.1;
      items.push({ x: cx + Math.cos(a) * rr, y: cy + Math.sin(a) * rr, p: i % 2 === 0 });
    }
    for (const it of items) {
      const g = ctx.createRadialGradient(it.x - 4, it.y - 4, 0, it.x, it.y, R * 0.12);
      g.addColorStop(0, "#fff");
      g.addColorStop(0.4, it.p ? "#ff7aa8" : "#9ad8ff");
      g.addColorStop(1, it.p ? "#a02050" : "#3060a0");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(it.x, it.y, R * 0.12, 0, Math.PI * 2); ctx.fill();
    }
  },
  quarks: (cx, cy, R, c) => drawQuarks(cx, cy, R, c),
  planck: (cx, cy, R, c) => drawPlanck(cx, cy, R * 0.7, c),
  blob: (cx, cy, R, c, anchor) => drawBlob(cx, cy, R, c, anchor.logM),
};

function hexA(hex, a) {
  const h = hex.replace("#", "");
  const r = parseInt(h.length === 3 ? h[0] + h[0] : h.substring(0, 2), 16);
  const g = parseInt(h.length === 3 ? h[1] + h[1] : h.substring(2, 4), 16);
  const b = parseInt(h.length === 3 ? h[2] + h[2] : h.substring(4, 6), 16);
  return `rgba(${r},${g},${b},${a})`;
}

function drawSwirl(cx, cy, R, color) {
  const t = performance.now() * 0.0002;
  for (let arm = 0; arm < 4; arm++) {
    ctx.beginPath();
    for (let i = 0; i < 120; i++) {
      const f = i / 120;
      const ang = arm * (Math.PI * 2 / 4) + f * 5 + t;
      const rr = f * R;
      const x = cx + Math.cos(ang) * rr;
      const y = cy + Math.sin(ang) * rr * 0.6;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = hexA(color, 0.6);
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  // Bright core
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, R * 0.3);
  g.addColorStop(0, "#fff");
  g.addColorStop(1, hexA(color, 0));
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(cx, cy, R * 0.3, 0, Math.PI * 2); ctx.fill();
}

function drawOrbits(cx, cy, R, color) {
  const t = performance.now() * 0.0005;
  // Sun
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, R * 0.18);
  g.addColorStop(0, "#fffbe0"); g.addColorStop(1, hexA("#ff9a3a", 0));
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(cx, cy, R * 0.18, 0, Math.PI * 2); ctx.fill();
  // Orbits
  for (let i = 1; i <= 5; i++) {
    const rr = R * (0.25 + i * 0.13);
    ctx.strokeStyle = hexA(color, 0.35);
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.ellipse(cx, cy, rr, rr * 0.7, 0, 0, Math.PI * 2); ctx.stroke();
    const ang = t * (6 - i) + i;
    const px = cx + Math.cos(ang) * rr;
    const py = cy + Math.sin(ang) * rr * 0.7;
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(px, py, 3 + i * 0.5, 0, Math.PI * 2); ctx.fill();
  }
}

function drawPlanet(cx, cy, R, color) {
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.fill();
  // Bands
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.clip();
  for (let i = 0; i < 12; i++) {
    ctx.fillStyle = hexA("#ffffff", 0.04 + (i % 2) * 0.04);
    ctx.fillRect(cx - R, cy - R + (i * R * 2 / 12), R * 2, R * 2 / 12);
  }
  ctx.restore();
  // Terminator shadow
  const g = ctx.createRadialGradient(cx - R * 0.4, cy - R * 0.3, R * 0.2, cx, cy, R);
  g.addColorStop(0, "rgba(0,0,0,0)"); g.addColorStop(1, "rgba(0,0,0,0.55)");
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.fill();
}

function drawHand(cx, cy, R, color) {
  // Open palm, fingers up. Skin tone fills, with subtle creases.
  ctx.fillStyle = hexA(color, 0.95);
  // Palm
  ctx.beginPath();
  ctx.moveTo(cx - R * 0.55, cy + R * 0.6);
  ctx.quadraticCurveTo(cx - R * 0.75, cy, cx - R * 0.55, cy - R * 0.3);
  ctx.lineTo(cx + R * 0.55, cy - R * 0.3);
  ctx.quadraticCurveTo(cx + R * 0.75, cy, cx + R * 0.55, cy + R * 0.6);
  ctx.closePath();
  ctx.fill();
  // Fingers
  const fingers = [
    { x: -0.45, top: -0.85, w: 0.13 },
    { x: -0.18, top: -0.95, w: 0.14 },
    { x:  0.10, top: -0.90, w: 0.14 },
    { x:  0.40, top: -0.75, w: 0.13 },
  ];
  for (const f of fingers) {
    ctx.beginPath();
    ctx.roundRect
      ? ctx.roundRect(cx + (f.x - f.w / 2) * R, cy + f.top * R, f.w * R, (-0.3 - f.top) * R + R * 0.05, R * 0.05)
      : ctx.rect(cx + (f.x - f.w / 2) * R, cy + f.top * R, f.w * R, (-0.3 - f.top) * R + R * 0.05);
    ctx.fill();
  }
  // Thumb
  ctx.beginPath();
  ctx.ellipse(cx - R * 0.7, cy + R * 0.1, R * 0.1, R * 0.28, -0.5, 0, Math.PI * 2);
  ctx.fill();
  // Palm creases
  ctx.strokeStyle = "rgba(120,70,50,0.45)";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx - R * 0.45, cy - R * 0.05); ctx.quadraticCurveTo(cx, cy + R * 0.05, cx + R * 0.4, cy - R * 0.1);
  ctx.moveTo(cx - R * 0.4, cy + R * 0.15);  ctx.quadraticCurveTo(cx - R * 0.1, cy + R * 0.3, cx + R * 0.45, cy + R * 0.1);
  ctx.moveTo(cx - R * 0.3, cy + R * 0.35);  ctx.quadraticCurveTo(cx, cy + R * 0.5, cx + R * 0.35, cy + R * 0.4);
  ctx.stroke();
  // Soft shading
  const g = ctx.createRadialGradient(cx - R * 0.2, cy - R * 0.2, R * 0.1, cx, cy + R * 0.3, R);
  g.addColorStop(0, "rgba(255,255,255,0.18)");
  g.addColorStop(1, "rgba(0,0,0,0.25)");
  ctx.fillStyle = g;
  ctx.fillRect(cx - R, cy - R, R * 2, R * 2);
}

function drawSkin(cx, cy, R, color) {
  // Close-up of skin: ridges, a pore, a hair emerging — sets up the next zoom into the hair.
  ctx.fillStyle = hexA(color, 0.9);
  ctx.fillRect(cx - R, cy - R, R * 2, R * 2);
  // Ridges — wavy parallel bands
  ctx.strokeStyle = "rgba(120,70,50,0.35)";
  ctx.lineWidth = 2;
  for (let i = -6; i <= 6; i++) {
    ctx.beginPath();
    const y0 = cy + i * R * 0.18;
    for (let x = -1; x <= 1.01; x += 0.05) {
      const y = y0 + Math.sin(x * 4 + i * 0.7) * R * 0.04;
      const px = cx + x * R;
      if (x === -1) ctx.moveTo(px, y); else ctx.lineTo(px, y);
    }
    ctx.stroke();
  }
  // Sweat pore
  ctx.fillStyle = "rgba(40,20,15,0.7)";
  ctx.beginPath(); ctx.ellipse(cx + R * 0.45, cy + R * 0.25, R * 0.05, R * 0.04, 0, 0, Math.PI * 2); ctx.fill();
  // Hair follicle base + emerging hair shaft (links to next frame: the hair)
  ctx.fillStyle = "rgba(80,50,30,0.6)";
  ctx.beginPath(); ctx.arc(cx - R * 0.25, cy + R * 0.05, R * 0.07, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "#5a3a22";
  ctx.lineWidth = R * 0.04;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(cx - R * 0.25, cy + R * 0.05);
  ctx.quadraticCurveTo(cx - R * 0.15, cy - R * 0.4, cx - R * 0.05, cy - R * 0.95);
  ctx.stroke();
  // Highlight
  const g = ctx.createRadialGradient(cx - R * 0.3, cy - R * 0.3, R * 0.1, cx, cy, R * 1.1);
  g.addColorStop(0, "rgba(255,255,255,0.2)");
  g.addColorStop(1, "rgba(0,0,0,0.3)");
  ctx.fillStyle = g;
  ctx.fillRect(cx - R, cy - R, R * 2, R * 2);
}

function drawBlob(cx, cy, R, color, L0) {
  ctx.fillStyle = hexA(color, 0.85);
  ctx.beginPath();
  const sides = 24;
  for (let i = 0; i <= sides; i++) {
    const ang = (i / sides) * Math.PI * 2;
    const wobble = 1 + 0.15 * Math.sin(ang * 5 + L0);
    const x = cx + Math.cos(ang) * R * wobble;
    const y = cy + Math.sin(ang) * R * 0.95 * wobble;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
}

function drawCluster(cx, cy, R, color, n) {
  for (let i = 0; i < n; i++) {
    const ang = (i / n) * Math.PI * 2 + i * 0.7;
    const rr = R * (0.3 + 0.5 * ((i * 37) % 100) / 100);
    const x = cx + Math.cos(ang) * rr;
    const y = cy + Math.sin(ang) * rr;
    const sz = R * 0.08 + ((i * 17) % 50) / 50 * R * 0.06;
    ctx.fillStyle = hexA(color, 0.7);
    ctx.beginPath(); ctx.arc(x, y, sz, 0, Math.PI * 2); ctx.fill();
  }
}

function drawAtom(cx, cy, R, color) {
  const t = performance.now() * 0.001;
  // Nucleus
  ctx.fillStyle = "#ff7aa8";
  ctx.beginPath(); ctx.arc(cx, cy, R * 0.08, 0, Math.PI * 2); ctx.fill();
  // Shells
  for (let s = 1; s <= 3; s++) {
    const rr = R * (0.25 + s * 0.22);
    ctx.strokeStyle = hexA(color, 0.45);
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.ellipse(cx, cy, rr, rr * 0.4, s * 0.7, 0, Math.PI * 2); ctx.stroke();
    // Electrons
    for (let e = 0; e < s + 1; e++) {
      const ang = t * (4 - s) + (e / (s + 1)) * Math.PI * 2;
      const px = cx + Math.cos(ang) * rr * Math.cos(s * 0.7) - Math.sin(ang) * rr * 0.4 * Math.sin(s * 0.7);
      const py = cy + Math.cos(ang) * rr * Math.sin(s * 0.7) + Math.sin(ang) * rr * 0.4 * Math.cos(s * 0.7);
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(px, py, 4, 0, Math.PI * 2); ctx.fill();
    }
  }
}

function drawQuarks(cx, cy, R, color) {
  const t = performance.now() * 0.002;
  const colors = ["#ff5fae", "#5fb8ff", "#ffd84a"];
  for (let i = 0; i < 3; i++) {
    const ang = t + i * (Math.PI * 2 / 3);
    const x = cx + Math.cos(ang) * R * 0.25;
    const y = cy + Math.sin(ang) * R * 0.25;
    const g = ctx.createRadialGradient(x, y, 0, x, y, R * 0.18);
    g.addColorStop(0, colors[i]); g.addColorStop(1, hexA(colors[i], 0));
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, R * 0.18, 0, Math.PI * 2); ctx.fill();
  }
}

function drawPlanck(cx, cy, R, color) {
  const t = performance.now() * 0.005;
  for (let i = 0; i < 24; i++) {
    const ang = i * 0.6 + t;
    const rr = R * (0.3 + Math.sin(t * 2 + i) * 0.3);
    const x = cx + Math.cos(ang) * rr;
    const y = cy + Math.sin(ang) * rr;
    ctx.fillStyle = `hsla(${(i * 30 + t * 50) % 360}, 90%, 70%, 0.7)`;
    ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
  }
}

// ---------- HUD ----------
const $name = document.getElementById("objName");
const $desc = document.getElementById("objDesc");
const $num  = document.getElementById("scaleNum");
const $hum  = document.getElementById("scaleHuman");
const $rail = document.getElementById("rail");

// Rail ticks
function buildRail() {
  const ticks = [-30, -20, -10, 0, 10, 20];
  for (const t of ticks) {
    const y = ((MAX_LOG - t) / (MAX_LOG - MIN_LOG)) * 100;
    const tick = document.createElement("div");
    tick.className = "tick"; tick.style.top = y + "%";
    $rail.appendChild(tick);
    const lab = document.createElement("div");
    lab.className = "tickLabel";
    lab.style.top = y + "%";
    lab.textContent = "10" + String(t).replace(/-/g, "⁻").replace(/\d/g, d => "⁰¹²³⁴⁵⁶⁷⁸⁹"[+d]) + " m";
    $rail.appendChild(lab);
  }
  const knob = document.createElement("div");
  knob.className = "knob"; knob.id = "knob";
  $rail.appendChild(knob);
}
buildRail();
const $knob = document.getElementById("knob");

// Make rail draggable: click-to-jump and drag-to-scrub
let railDragging = false;
function railYToLog(clientY) {
  const rect = $rail.getBoundingClientRect();
  const t = Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
  return MAX_LOG - t * (MAX_LOG - MIN_LOG);
}
function onRailMove(e) {
  if (!railDragging) return;
  targetLog = railYToLog(e.clientY);
  clampTarget();
  e.preventDefault();
}
function startRailDrag(e) {
  railDragging = true;
  targetLog = railYToLog(e.clientY);
  clampTarget();
  e.preventDefault();
  e.stopPropagation();
}
$rail.addEventListener("pointerdown", (e) => {
  startRailDrag(e);
  $rail.setPointerCapture(e.pointerId);
});
$rail.addEventListener("pointermove", onRailMove);
$rail.addEventListener("pointerup", () => { railDragging = false; });
$rail.addEventListener("pointercancel", () => { railDragging = false; });

function updateHUD(L) {
  const { a, b, t } = findAnchors(L);
  const ts = smoothstep(t);
  const primary = ts < 0.5 ? a : b;
  $name.textContent = primary.name;
  $desc.textContent = primary.desc;
  const s = formatScale(L);
  $num.textContent = s.num;
  $hum.textContent = s.human;
  const y = ((MAX_LOG - L) / (MAX_LOG - MIN_LOG)) * 100;
  $knob.style.top = y + "%";
}

// ---------- Loop ----------
let lastFrame = 0;
const FRAME_MS = 1000 / 30; // cap at 30fps
let paused = false;
document.addEventListener("visibilitychange", () => { paused = document.hidden; if (!paused) requestAnimationFrame(frame); });
function frame(now) {
  if (paused) return;
  if (now - lastFrame < FRAME_MS) { requestAnimationFrame(frame); return; }
  lastFrame = now;
  logM = lerp(logM, targetLog, SMOOTH);
  drawBackdrop(logM);
  drawObject(logM);
  updateHUD(logM);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
